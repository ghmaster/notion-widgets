<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Condition</title>
<style>
  :root{
    --bg:#191919; --card:#232323;
    --text:#ececea; --sub:#9a9a95; --muted:#6f6f6a;
    --track:rgba(255,255,255,0.13); --goodzone:rgba(255,255,255,0.07);
    --caution:#EF9F27; --mark:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{padding:16px 10px;max-width:520px;margin:0 auto;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  @media(max-width:400px){.grid{grid-template-columns:repeat(2,1fr);gap:8px;}}
  .cell{background:var(--card);border-radius:10px;padding:12px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;border:0.5px solid rgba(255,255,255,0.08);}
  .head{display:flex;align-items:center;gap:4px;}
  .head i,.head svg{width:10px !important;height:10px !important;}
  .lbl{font-size:11px;color:var(--sub);}
  .val{font-size:21px;font-weight:500;line-height:1;}
  .sub{font-size:10px;color:var(--muted);margin-bottom:2px;}
  .barbox{width:100%;padding:0 2px;}
</style>
</head>
<body>
<div class="wrap"><div class="grid" id="grid"></div></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
const API="https://condition-api.keisuke322.workers.dev";
const CAUTION="#EF9F27",WHITE="#ececea",TRACK="rgba(255,255,255,0.13)",GOODZONE="rgba(255,255,255,0.07)",MARK="#ffffff";
const grid=document.getElementById("grid");

function barAbs(d){
  const pct=Math.max(0,Math.min(100,(d.cur-d.min)/(d.max-d.min)*100));
  const goalPct=d.goal!=null?(d.goal-d.min)/(d.max-d.min)*100:null;
  const zeroPct=d.zeroLine?(0-d.min)/(d.max-d.min)*100:null;
  const fill=d.status==="caution"?CAUTION:"rgba(255,255,255,0.55)";
  let m="";
  if(goalPct!=null)m+=`<div style="position:absolute;left:${goalPct}%;top:-1px;width:1px;height:8px;background:rgba(255,255,255,0.55);"></div>`;
  if(zeroPct!=null)m+=`<div style="position:absolute;left:${zeroPct}%;top:-2px;width:1px;height:10px;background:rgba(255,255,255,0.5);"></div>`;
  return `<div style="position:relative;width:100%;height:6px;background:${TRACK};border-radius:3px;"><div style="width:${pct}%;height:100%;background:${fill};border-radius:3px;"></div>${m}</div>`;
}
function barAvg(d){
  let rel=(d.cur-d.avg)/d.spread; if(!d.higherBetter)rel=-rel;
  const c=Math.max(-1,Math.min(1,rel)); const pos=50+c*45;
  const mc=d.status==="caution"?CAUTION:MARK;
  return `<div style="position:relative;width:100%;height:6px;"><div style="position:absolute;top:2px;width:100%;height:2px;background:${TRACK};border-radius:1px;"></div><div style="position:absolute;top:2px;left:50%;width:50%;height:2px;background:${GOODZONE};border-radius:1px;"></div><div style="position:absolute;left:50%;top:0;width:1px;height:6px;background:rgba(255,255,255,0.35);"></div><div style="position:absolute;left:${pos}%;top:-1px;width:8px;height:8px;border-radius:50%;background:${mc};transform:translateX(-50%);"></div></div>`;
}

function render(j){
  const tsb=j.tsb||{}, hrv=j.hrv||{}, rhr=j.restingHr||{}, sleep=j.sleep||{};
  const tsbVal=tsb.value;
  const cards=[
    {label:"TSB",sub:"調子",icon:"gauge",
     value:(tsbVal==null?"–":(tsbVal>0?"+":"")+tsbVal),status:tsb.status,
     type:"abs",min:-30,max:30,cur:(tsbVal==null?0:tsbVal),zeroLine:true},
    {label:"HRV",sub:"回復",icon:"activity",
     value:(hrv.value==null?"–":Math.round(hrv.value)),status:hrv.status,
     type:"avg",avg:(hrv.avg!=null?hrv.avg:41),cur:(hrv.value!=null?hrv.value:41),spread:15,higherBetter:true},
    {label:"安静時",sub:"心拍",icon:"heart",
     value:(rhr.value==null?"–":Math.round(rhr.value)),status:rhr.status,
     type:"avg",avg:(rhr.avg!=null?rhr.avg:44),cur:(rhr.value!=null?rhr.value:44),spread:8,higherBetter:false},
    {label:"睡眠",sub:(sleep.hours!=null?sleep.hours+"h":"–"),icon:"moon",
     value:(sleep.score!=null?Math.round(sleep.score):(sleep.hours!=null?sleep.hours:"–")),status:sleep.status,
     type:"abs",min:0,max:8,goal:7,cur:(sleep.hours!=null?sleep.hours:0)}
  ];
  grid.innerHTML="";
  cards.forEach(d=>{
    const caution=d.status==="caution";
    const valColor=caution?CAUTION:WHITE;
    const icoColor=caution?CAUTION:(d.status==="good"?"rgba(255,255,255,0.6)":"rgba(255,255,255,0.35)");
    const bar=d.type==="abs"?barAbs(d):barAvg(d);
    const cell=document.createElement("div");
    cell.className="cell";
    cell.innerHTML=`<div class="head"><i data-lucide="${d.icon}" style="color:${icoColor};"></i><span class="lbl">${d.label}</span></div><span class="val" style="color:${valColor};">${d.value}</span><span class="sub">${d.sub}</span><div class="barbox">${bar}</div>`;
    grid.appendChild(cell);
  });
  lucide.createIcons();
}

async function load(){
  try{
    const res=await fetch(API+"?t="+Date.now());
    const j=await res.json();
    if(j.error)throw new Error(j.error);
    render(j);
  }catch(e){
    if(!grid.hasChildNodes())grid.innerHTML='<div style="color:var(--muted);font-size:13px;padding:20px;text-align:center;grid-column:1/-1;">データを取得できませんでした</div>';
  }
}
load();
setInterval(load,300000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)load();});
</script>
</body>
</html>
