<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Triathlon</title>
<style>
  :root {
    --text-primary: #ececea;
    --text-secondary: #9a9a95;
    --text-muted: #6f6f6a;
    --track: rgba(255,255,255,0.15);
    --ring: #ffffff;
    --bg: #191919;
    --panel: #2a2a2a;
    --border: rgba(255,255,255,0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2%;
    padding: 16px 3%;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    user-select: none;
    -webkit-user-select: none;
  }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; }
  .ring-wrap { position: relative; width: 100%; max-width: 140px; aspect-ratio: 1 / 1; cursor: pointer; }
  .ring-wrap svg { width: 100%; height: 100%; display: block; }
  .center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .total { font-size: clamp(16px, 5.2vw, 22px); font-weight: 500; color: var(--text-primary); line-height: 1; }
  .sub { font-size: clamp(8px, 2.6vw, 10px); color: var(--text-secondary); margin-top: 5px; display: flex; align-items: center; gap: 3px; white-space: nowrap; }
  .sub.remain { color: var(--text-muted); margin-top: 2px; }
  .sub svg { width: clamp(8px, 2.6vw, 10px) !important; height: clamp(8px, 2.6vw, 10px) !important; stroke-width: 2; flex-shrink: 0; }
  .label { font-size: clamp(11px, 3.4vw, 14px); font-weight: 500; color: var(--text-primary); }

  .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 10; padding: 12px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: rgba(42,42,42,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 0.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px; width: 100%; max-width: 340px;
  }
  .modal h2 { font-size: 12px; font-weight: 500; color: var(--text-primary); margin-bottom: 12px; display: flex; align-items: center; gap: 5px; }
  .modal h2 svg { width: 13px; height: 13px; stroke-width: 2; }
  .fields { display: flex; gap: 8px; }
  .field { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .field label { font-size: 11px; color: var(--text-secondary); }
  .field input {
    width: 100%; background: #1c1c1c; border: 0.5px solid var(--border);
    border-radius: 7px; padding: 6px 4px; color: var(--text-primary);
    font-size: 14px; text-align: center; -webkit-appearance: none;
  }
  .btn-row { display: flex; gap: 6px; margin-top: 12px; }
  .btn { flex: 1; padding: 7px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border); background: transparent; color: var(--text-secondary); }
  .btn.primary { background: #fff; color: #191919; border-color: #fff; }
  .btn:active { transform: scale(0.98); }
</style>
</head>
<body>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2><i data-lucide="settings-2"></i>週間目標を設定 (km)</h2>
    <div class="fields">
      <div class="field">
        <label>Swim</label>
        <input type="number" step="0.1" min="0" id="in-swim">
      </div>
      <div class="field">
        <label>Bike</label>
        <input type="number" step="1" min="0" id="in-bike">
      </div>
      <div class="field">
        <label>Run</label>
        <input type="number" step="1" min="0" id="in-run">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-cancel">キャンセル</button>
      <button class="btn primary" id="btn-save">保存</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
const API_URL = "https://triathlon-api.keisuke322.workers.dev";

const grid = document.getElementById('grid');
const overlay = document.getElementById('overlay');
const r = 52, C = 2 * Math.PI * r;
let currentGoals = { swim: 5.6, bike: 150, run: 40 };

function render(values) {
  currentGoals = values.goals || currentGoals;
  const data = [
    { label: 'Swim', val: values.swim, goal: currentGoals.swim },
    { label: 'Bike', val: values.bike, goal: currentGoals.bike },
    { label: 'Run',  val: values.run,  goal: currentGoals.run }
  ];
  grid.innerHTML = '';
  data.forEach(d => {
    const pct = Math.min(100, d.val / d.goal * 100);
    const off = C * (1 - pct / 100);
    const remain = Math.max(0, Math.round((d.goal - d.val) * 10) / 10);
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `
      <div class="ring-wrap" data-modal="1">
        <svg viewBox="0 0 134 134">
          <circle cx="67" cy="67" r="${r}" fill="none" stroke="var(--track)" stroke-width="11"/>
          <circle cx="67" cy="67" r="${r}" fill="none" stroke="var(--ring)" stroke-width="11"
            stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"
            transform="rotate(-90 67 67)"/>
        </svg>
        <div class="center">
          <span class="total">${d.val}</span>
          <span class="sub"><i data-lucide="target"></i>${d.goal}</span>
          <span class="sub remain"><i data-lucide="flag"></i>${remain}</span>
        </div>
      </div>
      <span class="label">${d.label}</span>
    `;
    grid.appendChild(cell);
  });
  lucide.createIcons();
}

async function load() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const values = await res.json();
    if (values.error) throw new Error(values.error);
    render(values);
  } catch (e) {
    if (!grid.hasChildNodes()) {
      grid.innerHTML = '<div style="color:var(--text-muted); font-size:13px; padding:20px; text-align:center; grid-column:1/-1;">データを取得できませんでした</div>';
    }
  }
}

function openModal() {
  document.getElementById('in-swim').value = currentGoals.swim;
  document.getElementById('in-bike').value = currentGoals.bike;
  document.getElementById('in-run').value = currentGoals.run;
  overlay.classList.add('open');
}
function closeModal() { overlay.classList.remove('open'); }

// ダブルクリック(PC) & ダブルタップ(スマホ)で開く
grid.addEventListener('dblclick', (e) => {
  if (e.target.closest('[data-modal]')) openModal();
});
let lastTap = 0;
grid.addEventListener('touchend', (e) => {
  if (!e.target.closest('[data-modal]')) return;
  const now = Date.now();
  if (now - lastTap < 350) { e.preventDefault(); openModal(); }
  lastTap = now;
});

document.getElementById('btn-cancel').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

document.getElementById('btn-save').addEventListener('click', async () => {
  const goals = {
    swim: parseFloat(document.getElementById('in-swim').value),
    bike: parseFloat(document.getElementById('in-bike').value),
    run:  parseFloat(document.getElementById('in-run').value)
  };
  const btn = document.getElementById('btn-save');
  btn.textContent = '保存中...';
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(goals)
    });
    currentGoals = goals;
    closeModal();
    await load();
  } catch (e) {
    btn.textContent = '失敗';
  }
  setTimeout(() => { btn.textContent = '保存'; }, 800);
});

load();
setInterval(load, 60000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });
</script>
</body>
</html>
