<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Triathlon</title>
<style>
  :root {
    --text-primary: #ececea;
    --text-secondary: #9a9a95;
    --text-muted: #6f6f6a;
    --track: rgba(255,255,255,0.15);
    --ring: #ffffff;
    --bg: #191919;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2%;
    padding: 16px 3%;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
  }
  .cell {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    min-width: 0;
  }
  .ring-wrap {
    position: relative;
    width: 100%;
    max-width: 140px;
    aspect-ratio: 1 / 1;
  }
  .ring-wrap svg { width: 100%; height: 100%; display: block; }
  .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .total {
    font-size: clamp(16px, 5.2vw, 22px);
    font-weight: 500; color: var(--text-primary); line-height: 1;
  }
  .sub {
    font-size: clamp(8px, 2.6vw, 10px);
    color: var(--text-secondary);
    margin-top: 5px; display: flex; align-items: center; gap: 3px;
    white-space: nowrap;
  }
  .sub.remain { color: var(--text-muted); margin-top: 2px; }
  .sub svg {
    width: clamp(8px, 2.6vw, 10px) !important;
    height: clamp(8px, 2.6vw, 10px) !important;
    stroke-width: 2; flex-shrink: 0;
  }
  .label {
    font-size: clamp(11px, 3.4vw, 14px);
    font-weight: 500; color: var(--text-primary);
  }
</style>
</head>
<body>
<div class="grid" id="grid"></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
const API_URL = "https://triathlon-api.keisuke322.workers.dev";

// 目標値（週あたり km）
const GOALS = { Swim: 5.6, Bike: 150, Run: 40 };

const grid = document.getElementById('grid');
const r = 52, C = 2 * Math.PI * r;

function render(values) {
  const data = [
    { label: 'Swim', val: values.swim, goal: GOALS.Swim },
    { label: 'Bike', val: values.bike, goal: GOALS.Bike },
    { label: 'Run',  val: values.run,  goal: GOALS.Run }
  ];
  grid.innerHTML = '';
  data.forEach(d => {
    const pct = Math.min(100, d.val / d.goal * 100);
    const off = C * (1 - pct / 100);
    const remain = Math.max(0, Math.round((d.goal - d.val) * 10) / 10);
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `
      <div class="ring-wrap">
        <svg viewBox="0 0 134 134">
          <circle cx="67" cy="67" r="${r}" fill="none" stroke="var(--track)" stroke-width="11"/>
          <circle cx="67" cy="67" r="${r}" fill="none" stroke="var(--ring)" stroke-width="11"
            stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"
            transform="rotate(-90 67 67)"/>
        </svg>
        <div class="center">
          <span class="total">${d.val}</span>
          <span class="sub"><i data-lucide="target"></i>${d.goal}</span>
          <span class="sub remain"><i data-lucide="flag"></i>${remain}</span>
        </div>
      </div>
      <span class="label">${d.label}</span>
    `;
    grid.appendChild(cell);
  });
  lucide.createIcons();
}

async function load() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const values = await res.json();
    if (values.error) throw new Error(values.error);
    render(values);
  } catch (e) {
    if (!grid.hasChildNodes()) {
      grid.innerHTML = '<div style="color:var(--text-muted); font-size:13px; padding:20px; text-align:center; grid-column:1/-1;">データを取得できませんでした</div>';
    }
  }
}

load();
// 60秒ごとに最新値へ自動更新
setInterval(load, 60000);
// タブを再表示した時にも即更新
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) load();
});
</script>
</body>
</html>
