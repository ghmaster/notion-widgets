<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Triathlon</title>
<style>
  :root {
    --text-primary: #e8e8e6;
    --text-secondary: #9a9a95;
    --text-muted: #6a6a66;
    --track: rgba(255,255,255,0.15);
    --ring: #ffffff;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --text-primary: #1a1a19;
      --text-secondary: #6a6a66;
      --text-muted: #9a9a95;
      --track: rgba(120,120,120,0.25);
      --ring: #1a1a19;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 10px 6px;
    max-width: 460px;
    margin: 0 auto;
  }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .ring-wrap { position: relative; width: 134px; height: 134px; }
  .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .total { font-size: 27px; font-weight: 500; color: var(--text-primary); line-height: 1; }
  .sub {
    font-size: 11px; color: var(--text-secondary);
    margin-top: 6px; display: flex; align-items: center; gap: 4px;
  }
  .sub.remain { color: var(--text-muted); margin-top: 3px; }
  .sub i { width: 13px; height: 13px; stroke-width: 2; }
  .label { font-size: 14px; font-weight: 500; color: var(--text-primary); }
</style>
</head>
<body>
<div class="grid" id="grid"></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
const data = [
  { label: 'Swim', val: 3.6,   goal: 5.6 },
  { label: 'Bike', val: 129.8, goal: 150 },
  { label: 'Run',  val: 4.0,   goal: 40 }
];

const grid = document.getElementById('grid');
const r = 52, C = 2 * Math.PI * r;

data.forEach(d => {
  const pct = Math.min(100, d.val / d.goal * 100);
  const off = C * (1 - pct / 100);
  const remain = Math.max(0, Math.round((d.goal - d.val) * 10) / 10);

  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.innerHTML = `
    <div class="ring-wrap">
      <svg viewBox="0 0 134 134" width="134" height="134">
        <circle cx="67" cy="67" r="${r}" fill="none" stroke="var(--track)" stroke-width="11"/>
        <circle cx="67" cy="67" r="${r}" fill="none" stroke="var(--ring)" stroke-width="11"
          stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"
          transform="rotate(-90 67 67)"/>
      </svg>
      <div class="center">
        <span class="total">${d.val}</span>
        <span class="sub"><i data-lucide="target"></i>${d.goal}</span>
        <span class="sub remain"><i data-lucide="flag"></i>${remain}</span>
      </div>
    </div>
    <span class="label">${d.label}</span>
  `;
  grid.appendChild(cell);
});

lucide.createIcons();
</script>
</body>
</html>
